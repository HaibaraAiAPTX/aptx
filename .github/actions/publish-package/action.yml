name: 'Publish Package'
description: 'Download build artifacts and publish a package to npm registry'

inputs:
  package:
    description: 'Package name (directory name under packages/)'
    required: true
  npm-token:
    description: 'NPM token for authentication'
    required: true
  pnpm-version:
    description: 'pnpm version to use'
    required: false
    default: '10.29.1'
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20'
  npm-registry-url:
    description: 'NPM registry URL'
    required: false
    default: 'https://winserver.devserver.ink:14873/'
  npm-registry-auth-key:
    description: 'NPM registry auth key'
    required: false
    default: '//winserver.devserver.ink:14873/:_authToken'

runs:
  using: 'composite'
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: packages-build-artifacts
        path: .

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile --ignore-scripts

    - name: Extract build artifacts
      shell: bash
      run: tar -xzf packages-build-artifacts.tgz

    - name: Validate and publish package
      shell: bash
      working-directory: packages/${{ inputs.package }}
      env:
        NPM_TOKEN: ${{ inputs.npm-token }}
        NPM_REGISTRY_URL: ${{ inputs.npm-registry-url }}
        NPM_REGISTRY_AUTH_KEY: ${{ inputs.npm-registry-auth-key }}
        PNPM_STRICT_SSL: 'false'
        NPM_CONFIG_STRICT_SSL: 'false'
      run: |
        # Configure npm registry (must be before strict-ssl setting)
        pnpm config set strict-ssl false --location project
        pnpm config set registry "${NPM_REGISTRY_URL}"
        pnpm config set "${NPM_REGISTRY_AUTH_KEY}" "${NPM_TOKEN}"

        # Validate package
        pnpm pack --dry-run

        # Publish (skip if already exists)
        name=$(node -p "require('./package.json').name")
        version=$(node -p "require('./package.json').version")
        if pnpm view "${name}@${version}" version >/dev/null 2>&1; then
          echo "SKIP: ${name}@${version} already exists"
        else
          pnpm publish --ignore-scripts --no-git-checks
          echo "PUBLISHED: ${name}@${version}"
        fi
